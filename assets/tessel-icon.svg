<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <!-- Main tile gradient: indigo → violet -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <!-- Second tile gradient: teal → cyan -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- Third tile gradient: rose → orange -->
    <linearGradient id="g3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <!-- Kite subdivision lines -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="200" height="200" fill="#0F0F1A" rx="18"/>

  <!--
    Hat tile (12-vertex equilateral polygon, unit edge = 28px)
    Math basis: e1=(1,0) e2=(0.5, 0.866)
    Vertices in math coords: (0,0),(1,0),(1.5,-h),(2.5,-h),(3,-2h),(3.5,-h),(3,0),(3.5,h),(3,2h),(2,2h),(1.5,h),(0.5,h)
    where h=0.866.  Math → SVG: sx = x*28 + x_off,  sy = -y*28 + y_off
  -->

  <!-- === TILE 3 (background, partial — rose/orange) === -->
  <polygon
    points="
      186,100 146,100 126,134.6 86,134.6 66,169.3
      46,134.6 66,100 46,65.4 66,30.7 106,30.7
      126,65.4 166,65.4
    "
    fill="url(#g3)" opacity="0.25" filter="url(#shadow)"
    stroke="#FB923C" stroke-width="1.2" stroke-opacity="0.4"
    stroke-linejoin="round"
  />

  <!-- === TILE 2 (mid-layer — teal/cyan) === -->
  <polygon
    points="
      130,30 158,65 178,65 198,31 178,-3 158,-3
      138,31 138,65 118,65 98,100 118,134 138,100
    "
    fill="url(#g2)" opacity="0.32" filter="url(#shadow)"
    stroke="#06B6D4" stroke-width="1.2" stroke-opacity="0.5"
    stroke-linejoin="round"
  />

  <!-- === TILE 1 (foreground — indigo/violet) === -->
  <polygon
    id="hat"
    points="
      14,100  42,100  56,124.2  84,124.2  98,148.5
      112,124.2  98,100  112,75.8  98,51.5
      70,51.5  56,75.8  28,75.8
    "
    fill="url(#g1)" filter="url(#shadow)"
    stroke="white" stroke-width="1.5" stroke-linejoin="round"
  />

  <!-- Internal kite subdivision lines for the main tile -->
  <g stroke="white" stroke-width="0.6" opacity="0.3" stroke-linecap="round">
    <line x1="65" y1="93"  x2="14"  y2="100"/>
    <line x1="65" y1="93"  x2="42"  y2="100"/>
    <line x1="65" y1="93"  x2="56"  y2="124.2"/>
    <line x1="65" y1="93"  x2="84"  y2="124.2"/>
    <line x1="65" y1="93"  x2="98"  y2="148.5"/>
    <line x1="65" y1="93"  x2="112" y2="124.2"/>
    <line x1="65" y1="93"  x2="98"  y2="100"/>
    <line x1="65" y1="93"  x2="112" y2="75.8"/>
    <line x1="65" y1="93"  x2="98"  y2="51.5"/>
    <line x1="65" y1="93"  x2="70"  y2="51.5"/>
    <line x1="65" y1="93"  x2="56"  y2="75.8"/>
    <line x1="65" y1="93"  x2="28"  y2="75.8"/>
  </g>

  <!-- Small label: "t" in the lower-right -->
  <text x="175" y="186" font-family="'SF Mono', Menlo, monospace"
        font-size="16" font-weight="700" fill="white" opacity="0.5"
        text-anchor="middle">t</text>
</svg>