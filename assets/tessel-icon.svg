<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="120" height="120">
  <!--
    Tessel Studio icon: single Einstein "hat" tile (polykite)
    Outline only — transparent fill — uses currentColor for light/dark compatibility.
    Polygon vertices on a triangular grid, unit edge ≈ 26px.
    e1 = (26, 0)   e2 = (13, 22.5)  (60° unit vector)
  -->
  <polygon
    points="
      8,60
      34,60
      47,82.5
      73,82.5
      86,105
      99,82.5
      86,60
      99,37.5
      86,15
      60,15
      47,37.5
      21,37.5
    "
    fill="none"
    stroke="currentColor"
    stroke-width="3.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
</svg>
