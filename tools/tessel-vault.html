<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tessel Vault</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #1a1b1e;
  --surface: #24262b;
  --border:  #3a3c42;
  --text:    #d4d4d4;
  --muted:   #7a7d87;
  --accent:  #5b8af0;
  --green:   #4caf50;
  --yellow:  #f0c040;
  --red:     #e05555;
  --gold:    #d4a847;
}
body.light {
  --bg: #f0f0f2; --surface: #fff; --border: #d0d2d8; --text: #1a1b1e;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px; background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column;
}
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 48px; display: flex; align-items: center; gap: 12px;
}
header .logo { font-weight: 700; font-size: 15px; color: var(--gold); letter-spacing: .5px; }
header .sub  { color: var(--muted); font-size: 12px; }
header .spacer { flex: 1; }
button {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  border-radius: 4px; padding: 5px 12px; font-size: 12px; cursor: pointer;
  transition: background .15s, border-color .15s;
}
button:hover { background: var(--border); border-color: var(--accent); }
button.primary { background: var(--accent); border-color: #3d6dd4; color: #fff; }
button.primary:hover { background: #3d6dd4; }
button:disabled { opacity: .4; cursor: default; }
input[type=text], input[type=password] {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  border-radius: 4px; padding: 6px 10px; font-size: 12px; width: 100%;
  font-family: 'Cascadia Code', 'Fira Code', monospace;
}
input[type=text]:focus, input[type=password]:focus {
  outline: none; border-color: var(--accent);
}
.main { flex: 1; display: flex; justify-content: center; padding: 28px 20px; }
.card-row { display: flex; gap: 20px; max-width: 900px; width: 100%; align-items: flex-start; }
.card {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px; display: flex; flex-direction: column; gap: 14px;
}
.card h2 { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
.card h2 .icon { font-size: 17px; }
.drop-zone {
  border: 2px dashed var(--border); border-radius: 6px; padding: 24px 16px;
  text-align: center; cursor: pointer; color: var(--muted); font-size: 12px;
  transition: border-color .15s, background .15s; line-height: 1.7;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(91,138,240,.06); color: var(--text); }
.drop-zone.has-file { border-color: var(--green); color: var(--green); }
.drop-zone strong { display: block; font-size: 13px; margin-bottom: 4px; color: var(--text); }
label.field-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.phrase-row { display: flex; gap: 6px; }
.phrase-row input { flex: 1; font-size: 12px; }
.status-box {
  background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
  padding: 10px 12px; font-size: 12px; min-height: 48px; display: none;
  white-space: pre-wrap; word-break: break-all; line-height: 1.6;
}
.status-box.ok  { border-color: var(--green); color: var(--green); display: block; }
.status-box.err { border-color: var(--red);   color: var(--red);   display: block; }
.status-box.inf { border-color: var(--accent); color: var(--text);  display: block; }
.divider { width: 1px; background: var(--border); align-self: stretch; }
.meta-box {
  font-size: 11px; color: var(--muted); background: var(--bg);
  border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px;
  display: none; line-height: 1.7;
}
.meta-box.show { display: block; }
.meta-box strong { color: var(--text); }
.progress {
  height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; display: none;
}
.progress.show { display: block; }
.progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width .2s; }
</style>
</head>
<body>
<header>
  <span class="logo">🔒 Tessel Vault</span>
  <span class="sub">Encrypt · Decrypt · Manage export packages</span>
  <div class="spacer"></div>
  <button id="btn-theme">☀ Light</button>
</header>

<div class="main">
<div class="card-row">

  <!-- ---- ENCRYPT ---- -->
  <div class="card">
    <h2><span class="icon">🔐</span> Encrypt</h2>

    <div>
      <label class="field-label">ZIP export to encrypt</label>
      <div class="drop-zone" id="enc-drop">
        <strong id="enc-drop-label">Drop .zip here</strong>
        or <u style="cursor:pointer" id="enc-browse">browse</u>
      </div>
      <input type="file" id="enc-pick" accept=".zip" style="display:none">
    </div>

    <div>
      <label class="field-label">Passphrase</label>
      <div class="phrase-row">
        <input type="text" id="enc-phrase" placeholder="Enter or generate a passphrase" autocomplete="off">
        <button id="enc-gen" title="Generate passphrase">✦ Generate</button>
        <button id="enc-copy" title="Copy passphrase">⎘ Copy</button>
      </div>
    </div>

    <div>
      <label class="field-label">KDF</label>
      <select id="enc-kdf" style="background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 8px;font-size:12px;width:100%">
        <option value="pbkdf2">PBKDF2-SHA256 (210,000 iter) — standard</option>
      </select>
    </div>

    <div class="progress" id="enc-progress"><div class="progress-bar" id="enc-bar"></div></div>

    <button class="primary" id="enc-btn" disabled>🔒 Encrypt &amp; Download</button>

    <div class="status-box" id="enc-status"></div>
  </div>

  <div class="divider"></div>

  <!-- ---- DECRYPT ---- -->
  <div class="card">
    <h2><span class="icon">🔓</span> Decrypt</h2>

    <div>
      <label class="field-label">Encrypted package (.zip)</label>
      <div class="drop-zone" id="dec-drop">
        <strong id="dec-drop-label">Drop encrypted .zip here</strong>
        or <u style="cursor:pointer" id="dec-browse">browse</u>
      </div>
      <input type="file" id="dec-pick" accept=".zip" style="display:none">
    </div>

    <div class="meta-box" id="dec-meta"></div>

    <div>
      <label class="field-label">Passphrase</label>
      <div class="phrase-row">
        <input type="password" id="dec-phrase" placeholder="Enter passphrase" autocomplete="off">
        <button id="dec-show" title="Show/hide passphrase">👁</button>
      </div>
    </div>

    <div class="progress" id="dec-progress"><div class="progress-bar" id="dec-bar"></div></div>

    <button class="primary" id="dec-btn" disabled>🔓 Decrypt &amp; Download</button>

    <div class="status-box" id="dec-status"></div>
  </div>

</div>
</div>

<script>
(function() {
'use strict';

// ---- theme ----
(function(){
  var btn = document.getElementById('btn-theme');
  if (localStorage.getItem('tessel-vault:theme') === 'light') { document.body.classList.add('light'); btn.textContent = '☾ Dark'; }
  btn.addEventListener('click', function(){
    var l = document.body.classList.toggle('light');
    btn.textContent = l ? '☾ Dark' : '☀ Light';
    localStorage.setItem('tessel-vault:theme', l ? 'light' : 'dark');
  });
})();

// ---- passphrase wordlists ----
var _adj = ['amber','bold','brisk','calm','chief','crisp','dark','deep','fast','firm',
  'fleet','fresh','grand','grey','hard','high','keen','kind','lean','light','long','mild',
  'neat','noble','pale','prime','pure','quiet','rare','rich','safe','sharp','slow','small',
  'soft','still','swift','tall','thin','true','warm','wide','wild'];
var _ani = ['bat','bear','bee','buck','bull','cat','cod','crane','crow','deer','doe','dog',
  'dove','duck','elk','emu','falcon','finch','fox','frog','gnu','hawk','hen','hog','ibis',
  'jay','kite','lark','lynx','mink','mole','moose','moth','mule','newt','owl','pike','ram',
  'rat','raven','robin','stag','swan','toad','vole','wasp','wolf','wren','yak'];
function _rnd(arr){ var b=new Uint16Array(1); crypto.getRandomValues(b); return arr[b[0]%arr.length]; }
function _rndN(n){ var b=new Uint16Array(1); crypto.getRandomValues(b); return b[0]%n; }
function genPassphrase(){ return _rnd(_adj)+'.'+_rnd(_ani)+'.'+_rnd(_adj)+'.'+_rnd(_ani)+'.'+(_rndN(90)+10); }

// ---- ZIP builder ----
function crc32(buf){
  var t=crc32.t||(crc32.t=function(){ var t=new Uint32Array(256); for(var i=0;i<256;i++){var c=i;for(var j=0;j<8;j++)c=c&1?(0xEDB88320^(c>>>1)):c>>>1;t[i]=c;} return t; }());
  var crc=0xFFFFFFFF; for(var i=0;i<buf.length;i++) crc=(crc>>>8)^t[(crc^buf[i])&0xFF]; return (crc^0xFFFFFFFF)>>>0;
}
function str2u8(s){ return new TextEncoder().encode(s); }
function buildZip(files){
  var localParts=[],centralDir=[],offset=0;
  files.forEach(function(f){
    var name=str2u8(f.name),data=typeof f.data==='string'?str2u8(f.data):f.data;
    var crc=crc32(data);
    var lh=new Uint8Array(30+name.length),dv=new DataView(lh.buffer);
    dv.setUint32(0,0x04034b50,true);dv.setUint16(4,20,true);dv.setUint32(14,crc,true);
    dv.setUint32(18,data.length,true);dv.setUint32(22,data.length,true);dv.setUint16(26,name.length,true);
    lh.set(name,30);
    var ch=new Uint8Array(46+name.length),cv=new DataView(ch.buffer);
    cv.setUint32(0,0x02014b50,true);cv.setUint16(4,20,true);cv.setUint16(6,20,true);
    cv.setUint32(16,crc,true);cv.setUint32(20,data.length,true);cv.setUint32(24,data.length,true);
    cv.setUint16(28,name.length,true);cv.setUint32(42,offset,true);ch.set(name,46);
    centralDir.push(ch);localParts.push(lh,data);offset+=lh.length+data.length;
  });
  var cdSz=centralDir.reduce(function(a,b){return a+b.length;},0);
  var eocd=new Uint8Array(22),ev=new DataView(eocd.buffer);
  ev.setUint32(0,0x06054b50,true);ev.setUint16(8,files.length,true);ev.setUint16(10,files.length,true);
  ev.setUint32(12,cdSz,true);ev.setUint32(16,offset,true);
  var parts=localParts.concat(centralDir,[eocd]),total=parts.reduce(function(a,b){return a+b.length;},0);
  var out=new Uint8Array(total),pos=0; parts.forEach(function(p){out.set(p,pos);pos+=p.length;}); return out;
}

// ---- ZIP parser ----
function parseZip(ab){
  var u8=new Uint8Array(ab),dv=new DataView(ab),files={},i=0;
  while(i<u8.length-3){
    if(dv.getUint32(i,true)===0x04034b50){
      var fnLen=dv.getUint16(i+26,true),exLen=dv.getUint16(i+28,true),cmpSz=dv.getUint32(i+18,true);
      var fname=new TextDecoder().decode(u8.slice(i+30,i+30+fnLen));
      var off=i+30+fnLen+exLen; files[fname]=ab.slice(off,off+cmpSz); i=off+cmpSz;
    } else i++;
  }
  return Object.keys(files).length?files:null;
}

// ---- crypto helpers ----
function u8ToB64(u){ return btoa(Array.from(u).map(function(b){return String.fromCharCode(b);}).join('')); }
function b64ToU8(s){ var b=atob(s),a=new Uint8Array(b.length); for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i); return a; }

async function deriveKey(passphrase, salt, iter){
  var km = await crypto.subtle.importKey('raw', new TextEncoder().encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:iter||210000,hash:'SHA-256'}, km, {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']);
}

// ---- decrypt.html template (embedded in encrypted packages) ----
var DECRYPT_HTML = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Tessel Vault — Decrypt</title>' +
'<style>body{font-family:system-ui,sans-serif;background:#1a1b1e;color:#d4d4d4;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}' +
'.box{background:#24262b;border:1px solid #3a3c42;border-radius:8px;padding:32px;max-width:420px;width:100%;display:flex;flex-direction:column;gap:16px}' +
'h2{font-size:15px;font-weight:700;color:#d4a847}input{background:#1a1b1e;border:1px solid #3a3c42;color:#d4d4d4;border-radius:4px;padding:8px 10px;width:100%;font-size:13px;font-family:monospace}' +
'button{background:#5b8af0;border:none;color:#fff;border-radius:4px;padding:8px 16px;font-size:13px;cursor:pointer;width:100%}' +
'button:hover{background:#3d6dd4}.status{font-size:12px;min-height:20px;color:#e05555}</style></head>' +
'<body><div class="box"><h2>🔒 Tessel Vault — Decrypt Package</h2>' +
'<div><label style="font-size:11px;color:#7a7d87">PASSPHRASE</label><input type="password" id="ph" placeholder="Enter passphrase" autocomplete="off"></div>' +
'<button id="go">🔓 Decrypt &amp; Download</button><div class="status" id="st"></div></div>' +
'<script>(function(){' +
'function b64u(s){var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}' +
'document.getElementById("go").addEventListener("click",async function(){' +
'var p=document.getElementById("ph").value.trim();var st=document.getElementById("st");' +
'if(!p){st.textContent="Enter passphrase";return;}' +
'try{var r=await fetch("payload.enc");var ct=await r.arrayBuffer();' +
'var mr=await fetch("meta.json");var meta=await mr.json();' +
'var salt=b64u(meta.salt),iv=b64u(meta.iv);' +
'var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(p),"PBKDF2",false,["deriveKey"]);' +
'var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:meta.iter||210000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);' +
'var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);' +
'var url=URL.createObjectURL(new Blob([pt],{type:"application/zip"}));' +
'var a=document.createElement("a");a.href=url;a.download=meta.inner_name||"decrypted.zip";document.body.appendChild(a);a.click();document.body.removeChild(a);' +
'st.style.color="#4caf50";st.textContent="Decrypted — download started.";}' +
'catch(e){st.textContent="Decryption failed: "+e.message;}' +
'});})();<\/script></body></html>';

var DECRYPT_PY = '#!/usr/bin/env python3\n' +
'"""Tessel Vault — Python decryptor for AES-256-GCM encrypted packages.\n' +
'Usage: python decrypt.py  (prompts for passphrase, writes decrypted .zip)\n' +
'Requires Python 3.9+ (no external dependencies).\n"""\n' +
'import json, base64, getpass, pathlib\n' +
'from cryptography.hazmat.primitives.kdf.pbkdf2 import PBKDF2HMAC\n' +
'from cryptography.hazmat.primitives import hashes\n' +
'from cryptography.hazmat.primitives.ciphers.aead import AESGCM\n\n' +
'meta = json.loads(pathlib.Path("meta.json").read_text())\n' +
'ct   = pathlib.Path("payload.enc").read_bytes()\n' +
'salt = base64.b64decode(meta["salt"])\n' +
'iv   = base64.b64decode(meta["iv"])\n' +
'pw   = getpass.getpass("Passphrase: ").encode()\n' +
'kdf  = PBKDF2HMAC(algorithm=hashes.SHA256(), length=32, salt=salt, iterations=meta.get("iter", 210000))\n' +
'key  = kdf.derive(pw)\n' +
'pt   = AESGCM(key).decrypt(iv, ct, None)\n' +
'out  = meta.get("inner_name", "decrypted.zip")\n' +
'pathlib.Path(out).write_bytes(pt)\n' +
'print(f"Decrypted: {out}")\n';

// ---- save helper ----
async function saveBlob(blob, name){
  if(window.showSaveFilePicker){
    try{
      var h=await window.showSaveFilePicker({suggestedName:name,types:[{description:'ZIP',accept:{'application/zip':['.zip']}}]});
      var w=await h.createWritable(); await w.write(blob); await w.close(); return;
    }catch(e){if(e.name==='AbortError')return;}
  }
  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1200);
}

function setProgress(barId, progId, pct){
  var bar=document.getElementById(barId),prog=document.getElementById(progId);
  if(!prog||!bar)return;
  prog.classList.toggle('show', pct>=0&&pct<100);
  bar.style.width=(pct||0)+'%';
}
function setStatus(id, msg, cls){
  var el=document.getElementById(id);
  el.textContent=msg; el.className='status-box '+(cls||'');
}

// ---- state ----
var encFile = null, decFile = null, decMeta = null;

// ---- drop zones ----
function wireDropZone(dropId, pickId, browseId, labelId, onFile){
  var drop=document.getElementById(dropId),pick=document.getElementById(pickId);
  var browse=document.getElementById(browseId),lbl=document.getElementById(labelId);
  function handleFile(f){ if(!f)return; lbl.textContent=f.name+' ('+Math.round(f.size/1024)+' KB)'; drop.classList.add('has-file'); onFile(f); }
  drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('drag-over');});
  drop.addEventListener('dragleave',function(){drop.classList.remove('drag-over');});
  drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('drag-over');handleFile(e.dataTransfer.files&&e.dataTransfer.files[0]);});
  drop.addEventListener('click',function(){pick.click();});
  if(browse)browse.addEventListener('click',function(e){e.stopPropagation();pick.click();});
  pick.addEventListener('change',function(){handleFile(this.files&&this.files[0]);this.value='';});
}

wireDropZone('enc-drop','enc-pick','enc-browse','enc-drop-label',function(f){
  encFile=f; document.getElementById('enc-btn').disabled=false;
  setStatus('enc-status','','');
});

wireDropZone('dec-drop','dec-pick','dec-browse','dec-drop-label',function(f){
  decFile=f; decMeta=null;
  document.getElementById('dec-btn').disabled=true;
  setStatus('dec-status','Reading package…','inf');
  var rd=new FileReader(); rd.onload=function(e){
    var files=parseZip(e.target.result);
    if(!files||!files['meta.json']){setStatus('dec-status','Not a Tessel encrypted package (meta.json not found).','err');return;}
    try{
      decMeta=JSON.parse(new TextDecoder().decode(files['meta.json']));
      var mb=document.getElementById('dec-meta');
      mb.innerHTML='<strong>Algorithm:</strong> '+decMeta.alg+'<br>'+
        '<strong>KDF:</strong> '+decMeta.kdf+' ('+decMeta.iter+' iter)<br>'+
        '<strong>Inner file:</strong> '+(decMeta.inner_name||'—');
      mb.className='meta-box show';
      document.getElementById('dec-btn').disabled=false;
      setStatus('dec-status','Package verified — enter passphrase to decrypt.','inf');
    }catch(ex){setStatus('dec-status','Failed to parse meta.json: '+ex.message,'err');}
  };
  rd.readAsArrayBuffer(f);
});

// ---- passphrase helpers ----
document.getElementById('enc-gen').addEventListener('click',function(){
  document.getElementById('enc-phrase').value=genPassphrase();
});
document.getElementById('enc-copy').addEventListener('click',function(){
  var v=document.getElementById('enc-phrase').value;
  if(!v)return;
  navigator.clipboard.writeText(v).then(function(){
    var btn=document.getElementById('enc-copy'),old=btn.textContent;
    btn.textContent='Copied!'; setTimeout(function(){btn.textContent=old;},1400);
  }).catch(function(){});
});
document.getElementById('dec-show').addEventListener('click',function(){
  var inp=document.getElementById('dec-phrase');
  inp.type=inp.type==='password'?'text':'password';
  document.getElementById('dec-show').textContent=inp.type==='password'?'👁':'🙈';
});

// ---- ENCRYPT ----
document.getElementById('enc-btn').addEventListener('click',async function(){
  var phrase=document.getElementById('enc-phrase').value.trim();
  if(!phrase){setStatus('enc-status','Enter a passphrase first.','err');return;}
  if(!encFile){setStatus('enc-status','Select a ZIP file first.','err');return;}

  var btn=document.getElementById('enc-btn');
  btn.disabled=true; setStatus('enc-status','Encrypting…','inf');
  setProgress('enc-bar','enc-progress',10);

  try{
    var ab = await encFile.arrayBuffer();
    setProgress('enc-bar','enc-progress',30);

    var salt = crypto.getRandomValues(new Uint8Array(16));
    var iv   = crypto.getRandomValues(new Uint8Array(12));
    var iter = 210000;
    var key  = await deriveKey(phrase, salt, iter);
    setProgress('enc-bar','enc-progress',60);

    var ct = await crypto.subtle.encrypt({name:'AES-GCM',iv:iv}, key, ab);
    setProgress('enc-bar','enc-progress',80);

    var innerName = encFile.name;
    var meta = {v:1,alg:'AES-256-GCM',kdf:'PBKDF2-SHA256',iter:iter,
      salt:u8ToB64(salt),iv:u8ToB64(iv),inner_name:innerName};

    var files=[
      {name:'payload.enc',  data:new Uint8Array(ct)},
      {name:'meta.json',    data:JSON.stringify(meta,null,2)},
      {name:'decrypt.html', data:DECRYPT_HTML},
      {name:'decrypt.py',   data:DECRYPT_PY},
      {name:'README.txt',   data:'Tessel Vault encrypted package\n\nOpen decrypt.html in any browser to decrypt.\nOr run: python decrypt.py\n\nPassphrase required — keep it safe.\n'}
    ];
    var outerZip = buildZip(files);
    setProgress('enc-bar','enc-progress',95);

    var baseName = innerName.replace(/\.zip$/i,'');
    var outName  = baseName+'_encrypted.zip';
    await saveBlob(new Blob([outerZip],{type:'application/zip'}), outName);
    setProgress('enc-bar','enc-progress',100);
    setStatus('enc-status','Encrypted: '+outName+'\nSize: '+Math.round(outerZip.length/1024)+' KB\n\n⚠ Store your passphrase safely — it cannot be recovered.','ok');
  }catch(e){
    setStatus('enc-status','Error: '+e.message,'err');
  }
  setProgress('enc-bar','enc-progress',100);
  setTimeout(function(){setProgress('enc-bar','enc-progress',-1);},600);
  btn.disabled=false;
});

// ---- DECRYPT ----
document.getElementById('dec-btn').addEventListener('click',async function(){
  var phrase=document.getElementById('dec-phrase').value.trim();
  if(!phrase){setStatus('dec-status','Enter passphrase.','err');return;}
  if(!decFile||!decMeta){setStatus('dec-status','Load an encrypted package first.','err');return;}

  var btn=document.getElementById('dec-btn');
  btn.disabled=true; setStatus('dec-status','Decrypting…','inf');
  setProgress('dec-bar','dec-progress',10);

  try{
    var ab=await decFile.arrayBuffer();
    var files=parseZip(ab);
    if(!files||!files['payload.enc']){setStatus('dec-status','payload.enc not found in package.','err');btn.disabled=false;return;}
    setProgress('dec-bar','dec-progress',30);

    var salt=b64ToU8(decMeta.salt),iv=b64ToU8(decMeta.iv),iter=decMeta.iter||210000;
    var key=await deriveKey(phrase,salt,iter);
    setProgress('dec-bar','dec-progress',60);

    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,files['payload.enc']);
    setProgress('dec-bar','dec-progress',90);

    var outName=decMeta.inner_name||'decrypted.zip';
    await saveBlob(new Blob([pt],{type:'application/zip'}),outName);
    setProgress('dec-bar','dec-progress',100);
    setStatus('dec-status','Decrypted: '+outName+'\nSize: '+Math.round(pt.byteLength/1024)+' KB','ok');
  }catch(e){
    var msg=e.message||String(e);
    if(msg.toLowerCase().includes('operation') || msg.toLowerCase().includes('decrypt'))
      setStatus('dec-status','Decryption failed — wrong passphrase or corrupted package.','err');
    else setStatus('dec-status','Error: '+msg,'err');
  }
  setProgress('dec-bar','dec-progress',100);
  setTimeout(function(){setProgress('dec-bar','dec-progress',-1);},600);
  btn.disabled=false;
});

})();
</script>
</body>
</html>
