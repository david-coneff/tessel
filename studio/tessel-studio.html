<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tessel Studio</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #1a1b1e;
  --surface:  #24262b;
  --border:   #3a3c42;
  --text:     #d4d4d4;
  --muted:    #7a7d87;
  --accent:   #5b8af0;
  --accent2:  #3d6dd4;
  --green:    #4caf50;
  --yellow:   #f0c040;
  --red:      #e05555;
  --toolbar-h: 44px;
  --status-h:  26px;
  --gutter:    4px;
}
body.light {
  --bg:      #f0f0f2;
  --surface: #ffffff;
  --border:  #d0d2d8;
  --text:    #1a1b1e;
  --muted:   #7a7d87;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ---- Toolbar ---- */
#toolbar {
  flex: 0 0 var(--toolbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
}
#toolbar .logo {
  font-weight: 700;
  font-size: 14px;
  letter-spacing: .5px;
  color: var(--accent);
  margin-right: 8px;
  white-space: nowrap;
}
#toolbar .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
#toolbar .spacer { flex: 1; }

button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, border-color .15s;
}
button:hover { background: var(--border); border-color: var(--accent); }
button.primary { background: var(--accent); border-color: var(--accent2); color: #fff; }
button.primary:hover { background: var(--accent2); }
button:disabled { opacity: .4; cursor: default; }

#filename-display {
  font-size: 12px;
  color: var(--muted);
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ---- Split pane ---- */
#workspace {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

#editor-pane {
  flex: 1 1 50%;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  min-width: 200px;
}

#editor-header {
  flex: 0 0 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
  font-size: 11px;
  color: var(--muted);
}
#editor-header span { font-weight: 600; color: var(--text); }

#editor {
  flex: 1;
  width: 100%;
  resize: none;
  border: none;
  outline: none;
  background: var(--bg);
  color: var(--text);
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.6;
  padding: 14px 16px;
  tab-size: 2;
}

/* ---- Drag handle ---- */
#drag-handle {
  flex: 0 0 var(--gutter);
  background: var(--border);
  cursor: col-resize;
  transition: background .15s;
}
#drag-handle:hover, #drag-handle.dragging { background: var(--accent); }

/* ---- Preview pane ---- */
#preview-pane {
  flex: 1 1 50%;
  display: flex;
  flex-direction: column;
  min-width: 200px;
}

#preview-header {
  flex: 0 0 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
  font-size: 11px;
  color: var(--muted);
}
#preview-header span { font-weight: 600; color: var(--text); }

#preview-frame {
  flex: 1;
  border: none;
  background: #fff;
}

#preview-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--muted);
  font-size: 13px;
}
#preview-placeholder .hint {
  font-size: 11px;
  max-width: 260px;
  text-align: center;
  line-height: 1.5;
}
#preview-placeholder button { font-size: 13px; padding: 6px 16px; }

/* ---- Status bar ---- */
#statusbar {
  flex: 0 0 var(--status-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 14px;
  font-size: 11px;
  color: var(--muted);
}
#statusbar .ok   { color: var(--green); }
#statusbar .err  { color: var(--red); }
#statusbar .warn { color: var(--yellow); }
#status-indicator { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
#status-indicator.ok  { background: var(--green); }
#status-indicator.err { background: var(--red); }

/* ---- Error overlay inside editor ---- */
#error-banner {
  display: none;
  position: absolute;
  bottom: var(--status-h);
  left: 0; right: 0;
  background: #5a1c1c;
  color: #ffcdd2;
  font-size: 12px;
  padding: 6px 12px;
  border-top: 1px solid var(--red);
  white-space: pre-wrap;
  max-height: 80px;
  overflow: auto;
  z-index: 10;
}
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <span class="logo">⬡ Tessel Studio</span>
  <div class="sep"></div>
  <button id="btn-open-md" title="Open a Markdown (.md) file">Open .md</button>
  <button id="btn-open-html" title="Re-open a compiled .html to extract its Markdown source">Open .html</button>
  <button id="btn-compile" class="primary" title="Compile now (Ctrl+Enter)" disabled>Compile</button>
  <button id="btn-download" title="Download compiled HTML" disabled>↓ Download .html</button>
  <div class="sep"></div>
  <span id="filename-display">No file open</span>
  <div class="spacer"></div>
  <button id="btn-theme">☀ Light</button>
</div>

<!-- Split workspace -->
<div id="workspace">

  <!-- Left: editor -->
  <div id="editor-pane">
    <div id="editor-header">
      <span>Markdown Source</span>
      <span id="editor-lines" style="margin-left:auto"></span>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="Open a .md file to get started, or start typing Tessel Markdown here…"></textarea>
  </div>

  <div id="drag-handle"></div>

  <!-- Right: preview -->
  <div id="preview-pane">
    <div id="preview-header">
      <span>Compiled Preview</span>
      <span id="preview-size" style="margin-left:auto"></span>
    </div>
    <div id="preview-placeholder">
      <div>No preview yet</div>
      <div class="hint">Start typing Markdown or open a .md file — the preview updates automatically.</div>
      <button id="btn-compile-first">Compile Now</button>
    </div>
    <iframe id="preview-frame"
      sandbox="allow-scripts allow-same-origin allow-forms allow-modals"
      style="display:none"
      title="Compiled Tessel document preview">
    </iframe>
  </div>

</div>

<!-- Status bar -->
<div id="statusbar">
  <div id="status-indicator"></div>
  <span id="status-text">Ready</span>
  <span style="margin-left:auto" id="status-right"></span>
</div>

<!-- Hidden file inputs -->
<input type="file" id="pick-md"   accept=".md,.markdown"  style="display:none">
<input type="file" id="pick-html" accept=".html,.htm"     style="display:none">

<!-- Load Tessel compiler bundle (relative to studio/ folder) -->
<script src="../dist/tessel.bundle.js"></script>

<script>
(function() {
  'use strict';

  // ---- state ----
  var currentMd       = '';
  var currentFilename = '';
  var lastHtml        = '';
  var compileTimer    = null;
  var DEBOUNCE_MS     = 500;

  // ---- elements ----
  var editor       = document.getElementById('editor');
  var frame        = document.getElementById('preview-frame');
  var placeholder  = document.getElementById('preview-placeholder');
  var statusInd    = document.getElementById('status-indicator');
  var statusText   = document.getElementById('status-text');
  var statusRight  = document.getElementById('status-right');
  var previewSize  = document.getElementById('preview-size');
  var editorLines  = document.getElementById('editor-lines');
  var filenameDisp = document.getElementById('filename-display');
  var btnCompile   = document.getElementById('btn-compile');
  var btnDownload  = document.getElementById('btn-download');

  // ---- theme ----
  (function() {
    var btn = document.getElementById('btn-theme');
    var stored = localStorage.getItem('tessel-studio:theme');
    if (stored === 'light') { document.body.classList.add('light'); btn.textContent = '☾ Dark'; }
    btn.addEventListener('click', function() {
      var light = document.body.classList.toggle('light');
      btn.textContent = light ? '☾ Dark' : '☀ Light';
      localStorage.setItem('tessel-studio:theme', light ? 'light' : 'dark');
    });
  })();

  // ---- Tessel compiler ----
  function getTessel() {
    if (typeof Tessel !== 'undefined') return Tessel;
    if (typeof window !== 'undefined' && window.Tessel) return window.Tessel;
    return null;
  }

  // ---- status helpers ----
  function setStatus(msg, cls) {
    statusText.textContent = msg;
    statusInd.className = cls || '';
  }

  // ---- compile ----
  function compile() {
    var T = getTessel();
    if (!T) { setStatus('Tessel compiler not loaded — check ../dist/tessel.bundle.js', 'err'); return; }
    var md = editor.value;
    if (!md.trim()) { setStatus('Empty document', ''); return; }
    var t0 = Date.now();
    try {
      var html = T.compile(md);
      lastHtml = html;
      var elapsed = Date.now() - t0;
      var kb = (html.length / 1024).toFixed(1);

      // Show in iframe
      frame.srcdoc = html;
      frame.style.display = '';
      placeholder.style.display = 'none';

      setStatus('Compiled OK', 'ok');
      statusRight.textContent = elapsed + 'ms · ' + kb + ' KB';
      previewSize.textContent = kb + ' KB';
      btnDownload.disabled = false;
    } catch (e) {
      setStatus('Compile error: ' + e.message, 'err');
      console.error(e);
    }
  }

  // ---- debounced auto-compile ----
  function scheduleCompile() {
    if (compileTimer) clearTimeout(compileTimer);
    compileTimer = setTimeout(compile, DEBOUNCE_MS);
    setStatus('Editing…', '');
  }

  editor.addEventListener('input', function() {
    updateEditorMeta();
    scheduleCompile();
    btnCompile.disabled = false;
  });

  function updateEditorMeta() {
    var lines = editor.value.split('\n').length;
    editorLines.textContent = lines + ' lines';
  }

  // ---- open .md ----
  function openMd(file) {
    currentFilename = file.name;
    filenameDisp.textContent = file.name;
    filenameDisp.title = file.name;
    var reader = new FileReader();
    reader.onload = function(e) {
      editor.value = e.target.result;
      updateEditorMeta();
      btnCompile.disabled = false;
      setStatus('Opened ' + file.name, '');
      compile();
    };
    reader.readAsText(file);
  }

  // ---- open .html (round-trip: extract embedded source) ----
  function openHtml(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var html = e.target.result;
      // Look for <script type="text/tessel-source" data-encoding="base64">
      var m = html.match(/<script[^>]+type="text\/tessel-source"[^>]*data-encoding="base64"[^>]*>([\s\S]*?)<\/script>/i);
      if (!m) {
        m = html.match(/<script[^>]+type="text\/tessel-source"[^>]*>([\s\S]*?)<\/script>/i);
      }
      if (!m || !m[1].trim()) {
        setStatus('No embedded Tessel source found in this HTML file.', 'err');
        return;
      }
      try {
        var b64 = m[1].trim();
        var decoded = decodeB64Utf8(b64);
        currentFilename = file.name.replace(/\.html?$/, '.md');
        filenameDisp.textContent = currentFilename + ' (from HTML)';
        editor.value = decoded;
        updateEditorMeta();
        btnCompile.disabled = false;
        setStatus('Source extracted from ' + file.name, 'ok');
        compile();
      } catch (ex) {
        setStatus('Failed to decode embedded source: ' + ex.message, 'err');
      }
    };
    reader.readAsText(file);
  }

  function decodeB64Utf8(b64) {
    // atob gives binary string; decode as UTF-8
    var bin = atob(b64.replace(/\s/g, ''));
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }

  // ---- download compiled .html ----
  async function downloadHtml() {
    if (!lastHtml) return;
    var name = currentFilename
      ? currentFilename.replace(/\.md$/i, '') + '.html'
      : 'tessel-doc.html';
    var blob = new Blob([lastHtml], { type: 'text/html' });
    if (window.showSaveFilePicker) {
      try {
        var h = await window.showSaveFilePicker({
          suggestedName: name,
          types: [{ description: 'HTML document', accept: { 'text/html': ['.html'] } }]
        });
        var w = await h.createWritable();
        await w.write(blob); await w.close();
        setStatus('Saved: ' + name, 'ok');
        return;
      } catch (e) { if (e.name === 'AbortError') return; }
    }
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1200);
    setStatus('Downloaded: ' + name, 'ok');
  }

  // ---- wire buttons ----
  document.getElementById('btn-open-md').addEventListener('click', function() {
    document.getElementById('pick-md').click();
  });
  document.getElementById('btn-open-html').addEventListener('click', function() {
    document.getElementById('pick-html').click();
  });
  document.getElementById('pick-md').addEventListener('change', function() {
    var f = this.files && this.files[0]; if (!f) return; this.value = ''; openMd(f);
  });
  document.getElementById('pick-html').addEventListener('change', function() {
    var f = this.files && this.files[0]; if (!f) return; this.value = ''; openHtml(f);
  });
  document.getElementById('btn-compile').addEventListener('click', compile);
  document.getElementById('btn-compile-first').addEventListener('click', compile);
  document.getElementById('btn-download').addEventListener('click', downloadHtml);

  // ---- keyboard shortcut: Ctrl/Cmd + Enter = compile now ----
  editor.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      if (compileTimer) { clearTimeout(compileTimer); compileTimer = null; }
      compile();
    }
    // Tab → insert 2 spaces
    if (e.key === 'Tab') {
      e.preventDefault();
      var s = editor.selectionStart, end = editor.selectionEnd;
      editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(end);
      editor.selectionStart = editor.selectionEnd = s + 2;
    }
  });

  // ---- drag-drop .md or .html onto editor ----
  editor.addEventListener('dragover', function(e) { e.preventDefault(); });
  editor.addEventListener('drop', function(e) {
    e.preventDefault();
    var f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (!f) return;
    if (/\.html?$/i.test(f.name)) openHtml(f);
    else openMd(f);
  });

  // Also allow drop anywhere on the window
  document.addEventListener('dragover', function(e) { e.preventDefault(); });
  document.addEventListener('drop', function(e) {
    e.preventDefault();
    var f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (!f) return;
    if (/\.html?$/i.test(f.name)) openHtml(f);
    else openMd(f);
  });

  // ---- drag resizer ----
  (function() {
    var handle   = document.getElementById('drag-handle');
    var edPane   = document.getElementById('editor-pane');
    var workspace = document.getElementById('workspace');
    var dragging = false, startX = 0, startW = 0;
    handle.addEventListener('mousedown', function(e) {
      dragging = true; startX = e.clientX; startW = edPane.offsetWidth;
      handle.classList.add('dragging');
      document.body.style.userSelect = 'none';
      document.body.style.cursor = 'col-resize';
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      var total = workspace.offsetWidth;
      var newW  = Math.max(180, Math.min(total - 200, startW + (e.clientX - startX)));
      edPane.style.flex = '0 0 ' + newW + 'px';
      try { localStorage.setItem('tessel-studio:split', newW); } catch(ex) {}
    });
    document.addEventListener('mouseup', function() {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('dragging');
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
    });
    try {
      var saved = localStorage.getItem('tessel-studio:split');
      if (saved) edPane.style.flex = '0 0 ' + saved + 'px';
    } catch(ex) {}
  })();

  // ---- check if compiler is available ----
  (function() {
    if (!getTessel()) {
      setStatus('Tessel bundle not found — run: node tools/rollup.js', 'err');
      btnCompile.disabled = true;
    } else {
      setStatus('Ready — Tessel ' + getTessel().version, '');
    }
  })();

  // ---- restore last session ----
  (function() {
    try {
      var saved = localStorage.getItem('tessel-studio:draft');
      if (saved) {
        editor.value = saved;
        updateEditorMeta();
        btnCompile.disabled = false;
        filenameDisp.textContent = 'Draft (restored)';
        setStatus('Draft restored from last session', '');
      }
    } catch(ex) {}
    // Auto-save draft on edit
    editor.addEventListener('input', function() {
      try { localStorage.setItem('tessel-studio:draft', editor.value); } catch(ex) {}
    });
  })();

})();
</script>
</body>
</html>
